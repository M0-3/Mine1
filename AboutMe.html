<h1>من أنا</h1>

<p>
اسمي الباقر. أنا طالب علوم الحاسوب في جامعة البصرة،
وأنا حالياً في سنتي الثانية.
</p>

<p>
أحب البرمجة والتقنية بشكل عام. أستمتع بتعلم أشياء جديدة
وتطوير مهاراتي في عالم البرمجيات.
</p>
